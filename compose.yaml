services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: d5-spam-guard-bot:latest
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      OCR_CACHE_PATH: /app/tessdata
    volumes:
      - bot-data:/app/data
      - ocr-cache:/app/tessdata
    read_only: true
    tmpfs:
      - /tmp:size=128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  bot-data:
  ocr-cache:
